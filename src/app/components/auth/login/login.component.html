<div class="login-container">
    <div class="login-card">
        <h2>Вход</h2>
        <p class="subtitle">Влезте в ShelfGuard</p>

        <form [formGroup]="formGroup" (ngSubmit)="login()">
            <div class="form-field">
                <label for="email">Имейл</label>
                <input id="email" type="email" formControlName="email" placeholder="you@example.com">
                @if (hasError('email', 'required')) {
                    <span class="error">Имейлът е задължителен</span>
                }
                @if (hasError('email', 'pattern')) {
                    <span class="error">Невалиден формат на имейл</span>
                }
            </div>

            <div class="form-field">
                <label for="password">Парола</label>
                <input id="password" type="password" formControlName="password" placeholder="Вашата парола">
                @if (hasError('password', 'required')) {
                    <span class="error">Паролата е задължителна</span>
                }
            </div>

            <button type="submit" class="btn btn-primary login-btn" [disabled]="isLoading()">
                {{ isLoading() ? 'Влизане...' : 'Вход' }}
            </button>
        </form>
    </div>
</div>
